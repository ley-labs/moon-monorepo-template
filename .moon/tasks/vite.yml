# yaml-language-server: $schema=../cache/schemas/tasks.json

inheritedBy:
  file: "vite.config.ts"

tasks:
  build:
    command: "bun vite build"
    deps:
      - "~:typecheck"
      - "~:lint"
    inputs:
      - "src/**/*"
      - "vite.config.ts"
      - "tsconfig.json"
      - file: "index.html"
        optional: true
      - file: "wrangler.json"
        optional: true
    outputs:
      - "dist"
