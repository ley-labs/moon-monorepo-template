# yaml-language-server: $schema=./node_modules/lefthook/schema.json

pre-commit:
  commands:
    sync:
      priority: 1
      run: moon sync
    format:
      priority: 2
      run: bun format {staged_files}
    add:
      priority: 3
      run: git add {staged_files}

commit-msg:
  commands:
    commitlint:
      run: bun commitlint --edit {1}
