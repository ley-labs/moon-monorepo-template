# yaml-language-server: $schema=../../.moon/cache/schemas/project.json

project:
  type: "tool"

tags: ["infra", "playwright"]

tasks:
  install-browsers:
    command: "bun playwright install --with-deps"
    options:
      cache: false
      runInCI: true
    inputs:
      - "/package.json"
      - "/bun.lock"
